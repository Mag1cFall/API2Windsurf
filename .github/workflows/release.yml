name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build (Wails, production)
        run: wails build -platform windows/amd64 -clean

      - name: Compute SHA256
        shell: pwsh
        run: |
          $exe = 'build/bin/api2windsurf.exe'
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $exe).Hash.ToLower()
          "$hash  api2windsurf.exe" | Set-Content -LiteralPath build/bin/api2windsurf.exe.sha256 -NoNewline -Encoding ascii
          Get-Content build/bin/api2windsurf.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api2windsurf-windows-amd64
          path: |
            build/bin/api2windsurf.exe
            build/bin/api2windsurf.exe.sha256

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/bin/api2windsurf.exe
            build/bin/api2windsurf.exe.sha256
